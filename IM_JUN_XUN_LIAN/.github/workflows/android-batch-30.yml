name: Android Batch Build (30)

on:
  workflow_dispatch:
    inputs:
      target_count:
        description: "Target APK count"
        required: true
        default: "30"
      build_number_base:
        description: "Build number base"
        required: true
        default: "100000"

jobs:
  build-android-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: stable
          cache: true

      - name: Restore Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ] || [ -z "${KEYSTORE_PASSWORD}" ] || [ -z "${KEY_ALIAS}" ] || [ -z "${KEY_PASSWORD}" ]; then
            echo "Missing required Android signing secrets" >&2
            exit 1
          fi

          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-upload.jks

          cat > android/key.properties <<EOF
          storeFile=app/release-upload.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Build APKs until target count
        shell: bash
        env:
          TARGET_COUNT: ${{ inputs.target_count }}
          BUILD_NUMBER_BASE: ${{ inputs.build_number_base }}
          FLUTTER_CMD: flutter
        run: |
          set -euo pipefail
          bash scripts/build_apk_until_30.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-batch
          path: |
            build/batch-apk/*.apk
            build/symbols/**
          if-no-files-found: error
